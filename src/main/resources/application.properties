# ===== Application =====
spring.application.name=mysavingaccount

# ===== Server =====
server.port=8080

# ===== PostgreSQL Database =====
spring.datasource.url=jdbc:postgresql://localhost:5432/mysavingaccount_db
spring.datasource.username=postgres
spring.datasource.password=your_postgres_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Thymeleaf =====
spring.thymeleaf.cache=false

# ===== JWT =====
jwt.secret=Uaesnd+7x9cP1OAaiAUzuD4wxXrWWqSQQuiE5aDc4G4=

jwt.expiration=86400000

# ===== Razorpay (Test Mode Keys) =====
razorpay.key.id=your_test_key_id
razorpay.key.secret=your_test_key_secret

# ===== Mail (using Gmail SMTP as example) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== Logging (optional, helpful for debugging) =====
logging.level.org.springframework.security=DEBUG